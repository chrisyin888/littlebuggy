# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Service URLs are derived from Render’s naming:
#   API:  https://littlebuggy-api.onrender.com   (must match `name: littlebuggy-api` below)
#   Site: https://littlebuggy-web.onrender.com   (must match `name: littlebuggy-web` below)
# If you rename either service in the Render dashboard, update this file (VITE_API_BASE_URL, LITTLEBUGGY_API_URL).
#
# Custom domain (littlebuggy.ca): add it on the static service in the dashboard; CORS below already allows it.
#
# Local dev: npm run dev:all
#
# Manual steps left: connect GitHub + Blueprint in Render, add GoDaddy DNS, add custom domain on static service.

databases:
  - name: littlebuggy-db
    plan: free
    region: oregon

services:
  - type: web
    name: littlebuggy-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: littlebuggy-db
          property: connectionString
      # No spaces. Includes custom domain + default Render hostname + local Vite for optional prod-API testing.
      - key: CORS_ORIGINS
        value: "https://littlebuggy.ca,https://www.littlebuggy.ca,https://littlebuggy-web.onrender.com,https://littlebuggy.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
      - key: ADMIN_HOMEPAGE_TOKEN
        generateValue: true

  - type: web
    name: littlebuggy-web
    runtime: static
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Baked into the client bundle at build time (must match API public URL).
      - key: VITE_API_BASE_URL
        value: "https://littlebuggy-api.onrender.com"

  - type: cron
    name: littlebuggy-cron-daily-environment
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    schedule: "30 16 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m app.jobs.run_daily_environment
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: littlebuggy-db
          property: connectionString

  - type: cron
    name: littlebuggy-cron-weekly-respiratory
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    schedule: "0 17 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m app.jobs.run_weekly_respiratory
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: littlebuggy-db
          property: connectionString

  - type: cron
    name: littlebuggy-cron-virus-trends
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    schedule: "30 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -c "import os,urllib.error,urllib.request; b=os.environ['LITTLEBUGGY_API_URL'].rstrip('/'); u=b+'/api/admin/virus-trends/refresh'; t=os.environ['ADMIN_HOMEPAGE_TOKEN']; r=urllib.request.Request(u,method='POST',headers={'X-Admin-Token':t}); urllib.request.urlopen(r,timeout=120).read()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: LITTLEBUGGY_API_URL
        value: "https://littlebuggy-api.onrender.com"
      - key: ADMIN_HOMEPAGE_TOKEN
        fromService:
          name: littlebuggy-api
          type: web
          envVarKey: ADMIN_HOMEPAGE_TOKEN
